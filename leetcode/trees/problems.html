<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trees — 27 Problems</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#F5F3EE;
      --ink:#0D0D0D;
      --muted:#888;
      --border:#D8D4CC;
      --panel:#FFFFFF;
      --tag-bg:#EDEAE4;
      --c1:#1A1AFF;
      --c2:#FF3B00;
      --c3:#007A3D;
      --c4:#8B00FF;
      --c5:#C8900A;
    }

    body{
      background:var(--bg);
      color:var(--ink);
      font-family:'Epilogue',sans-serif;
      min-height:100vh;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.025;
      z-index:9999;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size:220px 220px;
    }

    .page-header{
      background:#0D0D0D;
      color:#fff;
      padding:56px 48px 48px;
      position:relative;
      overflow:hidden;
    }

    .page-header::before{
      content:"";
      position:absolute;
      right:-64px;
      top:-64px;
      width:320px;
      height:320px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
    }

    .header-eyebrow{
      font-family:'IBM Plex Mono',monospace;
      font-size:11px;
      letter-spacing:3px;
      text-transform:uppercase;
      color:rgba(255,255,255,.42);
      margin-bottom:20px;
    }

    .page-header h1{
      font-size:clamp(34px,5vw,64px);
      font-weight:600;
      line-height:1.03;
      letter-spacing:-1.8px;
      margin-bottom:22px;
      max-width:900px;
    }

    .page-header h1 em{
      font-style:normal;
      opacity:.35;
      font-weight:400;
    }

    .header-meta{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .meta-pill{
      font-family:'IBM Plex Mono',monospace;
      font-size:11px;
      letter-spacing:.8px;
      padding:7px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      color:rgba(255,255,255,.66);
    }

    .grid-wrapper{
      padding:48px 40px 80px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .card{
      --accent:var(--c1);
      background:var(--panel);
      border:1.5px solid #D8D4CC;
      border-radius:16px;
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 42px rgba(13,13,13,.10);
    }

    .card-stripe{
      height:4px;
      background:var(--accent);
    }

    .card-head{
      padding:20px 22px 0;
    }

    .card-num{
      font-family:'IBM Plex Mono',monospace;
      font-size:10px;
      letter-spacing:2px;
      color:var(--muted);
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .card-title{
      font-size:16px;
      font-weight:600;
      letter-spacing:-.3px;
      line-height:1.25;
      margin-bottom:10px;
    }

    .approaches{
      padding:0 22px 14px;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    .ap-chip{
      font-family:'IBM Plex Mono',monospace;
      font-size:9px;
      font-weight:600;
      letter-spacing:1px;
      text-transform:uppercase;
      border-radius:999px;
      padding:5px 9px;
      color:#fff;
      background:#444;
    }

    .ap-chip.primary{
      background:var(--accent);
    }

    .problem-desc{
      padding:0 22px 14px;
      font-size:12.5px;
      line-height:1.56;
      color:var(--muted);
      border-bottom:1px dashed var(--border);
    }

    .card-viz{
      padding:0 16px 14px;
      border-bottom:1px dashed var(--border);
    }

    .card-viz svg{
      width:100%;
      height:95px;
      display:block;
      border-radius:8px;
    }

    .card-body{
      padding:16px 22px 0;
      display:flex;
      flex-direction:column;
      gap:14px;
      flex:1;
    }

    .insight-block{
      background:linear-gradient(180deg, rgba(0,0,0,.015), rgba(0,0,0,0)), var(--tag-bg);
      border-radius:12px;
      padding:12px 14px;
      border:1px solid rgba(0,0,0,.04);
      box-shadow:inset 3px 0 0 var(--accent);
    }

    .block-label{
      font-family:'IBM Plex Mono',monospace;
      font-size:9px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:6px;
    }

    .insight-text{
      font-size:13px;
      line-height:1.56;
      color:#333;
    }

    .mini-code{
      background:#0F1117;
      border-radius:12px;
      border:1px solid #20242d;
      overflow:hidden;
    }

    .titlebar{
      display:flex;
      align-items:center;
      gap:6px;
      padding:10px 12px;
      background:#141923;
      border-bottom:1px solid #212733;
    }

    .dot{width:10px;height:10px;border-radius:50%}
    .dot.red{background:#FF5F57}
    .dot.yellow{background:#FEBC2E}
    .dot.green{background:#28C840}

    .code-label{
      margin-left:auto;
      font-family:'IBM Plex Mono',monospace;
      font-size:9px;
      letter-spacing:1.6px;
      text-transform:uppercase;
      color:#5f6b7c;
    }

    .mini-code pre{
      padding:14px 16px 15px;
      overflow:auto;
      color:#C9D1D9;
      font-family:'IBM Plex Mono',monospace;
      font-size:11.5px;
      line-height:1.75;
      white-space:pre;
    }

    .kw{color:#FF79C6}
    .fn{color:#50FA7B}
    .nm{color:#BD93F9}
    .op{color:#FF6B35}
    .cm{color:#6272A4;font-style:italic}
    .str2{color:#F1FA8C}

    .gotcha{
      border-left:3px solid #FF3B00;
      background:rgba(255,59,0,.07);
      border-radius:0 10px 10px 0;
      padding:11px 12px;
    }

    .gotcha-title{
      font-family:'IBM Plex Mono',monospace;
      font-size:9px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:#9b3a23;
      margin-bottom:6px;
    }

    .gotcha p{
      font-size:12.5px;
      line-height:1.55;
      color:#5e362d;
    }

    .gotcha code,
    .insight-text code{
      font-family:'IBM Plex Mono',monospace;
      font-size:11px;
      background:rgba(255,59,0,.12);
      color:#8c2f18;
      padding:1px 5px;
      border-radius:5px;
    }

    .complexity-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .cx-badge{
      font-family:'IBM Plex Mono',monospace;
      font-size:10px;
      letter-spacing:.8px;
      padding:7px 10px;
      border-radius:999px;
      background:var(--tag-bg);
      color:#444;
    }

    .pattern-row{
      padding:0 22px 16px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .pattern-tag{
      font-family:'IBM Plex Mono',monospace;
      font-size:9.5px;
      letter-spacing:.4px;
      color:#666;
      background:var(--tag-bg);
      padding:6px 8px;
      border-radius:999px;
    }

    .page-footer{
      background:#0D0D0D;
      color:rgba(255,255,255,.44);
      font-family:'IBM Plex Mono',monospace;
      font-size:11px;
      letter-spacing:.8px;
      padding:20px 40px 24px;
    }

    svg text{
      font-family:'IBM Plex Mono',monospace;
    }

    @media (max-width: 1080px){
      .grid-wrapper{grid-template-columns:repeat(2,1fr)}
    }

    @media (max-width: 720px){
      .page-header{padding:42px 22px 34px}
      .grid-wrapper{grid-template-columns:1fr;padding:30px 18px 56px}
      .page-footer{padding:18px}
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="header-eyebrow">[Trees] — Problem Reference</div>
    <h1><span id="problem-count">27</span> Problems.<br /><em>Tree Traversal &amp; BST Invariants.</em></h1>
    <div class="header-meta">
      <span class="meta-pill">DFS / BFS</span>
      <span class="meta-pill">BST Invariants</span>
      <span class="meta-pill">Tree Reconstruction</span>
      <span class="meta-pill">Level Order Patterns</span>
      <span class="meta-pill">O(h) Stack Space</span>
      <span class="meta-pill">Java / Python Ready</span>
    </div>
  </header>

  <main class="grid-wrapper" id="grid"></main>

  <footer class="page-footer">leetcode::Trees · quick revision deck · tags: mvp</footer>

  <script>
    const cards = [
      {
        title: "Inorder Successor in BST",
        category: "BST",
        primary: "BST Walk",
        secondary: ["Inorder DFS"],
        desc: "Return the next node in inorder order for a given BST node p. In a BST, that means the smallest value strictly greater than p.val.",
        insight: "When you move left from a node greater than <code>p.val</code>, that node becomes the best successor candidate seen so far.",
        viz: "successor",
        code: `<span class="kw">TreeNode</span> succ <span class="op">=</span> <span class="kw">null</span>;\n<span class="kw">while</span> (root <span class="op">!=</span> <span class="kw">null</span>) {\n  <span class="kw">if</span> (p.val <span class="op">&gt;=</span> root.val) root <span class="op">=</span> root.right;\n  <span class="kw">else</span> {\n    succ <span class="op">=</span> root;\n    root <span class="op">=</span> root.left;\n  }\n}\n<span class="kw">return</span> succ;`,
        gotcha: "Use <code>p.val &gt;= root.val</code> for the right move. If you only use <code>&gt;</code>, the exact node <code>p</code> can be incorrectly kept as a candidate.",
        time: "O(h)",
        space: "O(1)",
        tags: ["successor", "ancestor candidate", "BST property"]
      },
      {
        title: "Binary Tree Traversals",
        category: "TRAVERSAL",
        primary: "Stack / Queue",
        secondary: ["Recursive DFS", "Level Order"],
        desc: "Know inorder, preorder, postorder, and level order cold. The real difference is when you record the node and whether you use a stack or queue.",
        insight: "Traversal order is just timing: record before children, between children, after children, or once per BFS layer.",
        viz: "traversals",
        code: `<span class="kw">while</span> (root <span class="op">!=</span> <span class="kw">null</span> <span class="op">||</span> !stack.isEmpty()) {\n  <span class="kw">while</span> (root <span class="op">!=</span> <span class="kw">null</span>) {\n    stack.push(root);\n    root <span class="op">=</span> root.left;\n  }\n  root <span class="op">=</span> stack.pop();\n  ans.add(root.val); <span class="cm">// inorder visit</span>\n  root <span class="op">=</span> root.right;\n}`,
        gotcha: "For iterative inorder, the outer loop must be <code>root != null || !stack.isEmpty()</code>. Using only one side drops either the right chain or the final stack drain.",
        time: "O(n)",
        space: "O(h)",
        tags: ["inorder", "preorder", "postorder", "level order"]
      },
      {
        title: "Binary Tree Maximum Path Sum",
        category: "TREE DP",
        primary: "Postorder DP",
        secondary: ["DFS"],
        desc: "Find the maximum sum of any path in the tree. The best path can start and end anywhere, but each edge can only be used once.",
        insight: "Each node contributes one downward branch upward, but updates the global answer with a split path using both children.",
        viz: "maxPath",
        code: `<span class="kw">int</span> left <span class="op">=</span> Math.max(<span class="nm">0</span>, <span class="fn">dfs</span>(node.left));\n<span class="kw">int</span> right <span class="op">=</span> Math.max(<span class="nm">0</span>, <span class="fn">dfs</span>(node.right));\nbest <span class="op">=</span> Math.max(best, left <span class="op">+</span> right <span class="op">+</span> node.val);\n<span class="kw">return</span> Math.max(left, right) <span class="op">+</span> node.val;\n\n<span class="cm">// best uses split path</span>\n<span class="cm">// return uses single branch</span>`,
        gotcha: "Clamp child gains with <code>Math.max(0, ...)</code>. Without that, a negative subtree breaks cases like <code>[2,-1,-2]</code>.",
        time: "O(n)",
        space: "O(h)",
        tags: ["postorder", "global answer", "path gain"]
      },
      {
        title: "Subtree With Maximum Sum",
        category: "TREE DP",
        primary: "Postorder Sum",
        secondary: ["DFS"],
        desc: "Return the maximum subtree sum, where a subtree includes a node and all its descendants. Every node defines one candidate subtree.",
        insight: "Unlike path sum, subtree sum must include both children entirely, so each node has exactly one subtree total: <code>L + R + val</code>.",
        viz: "subtreeSum",
        code: `<span class="kw">int</span> left <span class="op">=</span> <span class="fn">dfs</span>(node.left);\n<span class="kw">int</span> right <span class="op">=</span> <span class="fn">dfs</span>(node.right);\n<span class="kw">int</span> sum <span class="op">=</span> left <span class="op">+</span> right <span class="op">+</span> node.val;\nres <span class="op">=</span> Math.max(res, sum);\n<span class="kw">return</span> sum;\n\n<span class="cm">// every node anchors one subtree</span>`,
        gotcha: "Do not prune negatives to <code>0</code> here. That rule belongs to path sum, not subtree sum, because a subtree must include all descendants under the node.",
        time: "O(n)",
        space: "O(h)",
        tags: ["subtree sum", "postorder accumulation", "global max"]
      },
      {
        title: "Same Tree",
        category: "DFS",
        primary: "Recursive Compare",
        secondary: ["Iterative Pair Stack"],
        desc: "Check whether two binary trees are structurally identical and contain the same values at matching positions.",
        insight: "Equality requires matching null structure first, then matching node values, then matching both corresponding subtrees.",
        viz: "sameTree",
        code: `<span class="kw">if</span> (p <span class="op">==</span> <span class="kw">null</span> <span class="op">&amp;&amp;</span> q <span class="op">==</span> <span class="kw">null</span>) <span class="kw">return</span> <span class="kw">true</span>;\n<span class="kw">if</span> (p <span class="op">==</span> <span class="kw">null</span> <span class="op">||</span> q <span class="op">==</span> <span class="kw">null</span>) <span class="kw">return</span> <span class="kw">false</span>;\n<span class="kw">if</span> (p.val <span class="op">!=</span> q.val) <span class="kw">return</span> <span class="kw">false</span>;\n<span class="kw">return</span> <span class="fn">same</span>(p.left, q.left)\n    <span class="op">&amp;&amp;</span> <span class="fn">same</span>(p.right, q.right);`,
        gotcha: "Check null mismatch before <code>p.val != q.val</code>. Accessing <code>p.val</code> early explodes on shapes like <code>[1,2]</code> vs <code>[1,null,2]</code>.",
        time: "O(n)",
        space: "O(h)",
        tags: ["tree equality", "structural match", "recursive base case"]
      },
      {
        title: "Maximum Depth of Binary Tree",
        category: "DFS",
        primary: "Depth Recursion",
        secondary: ["Iterative Stack", "BFS Levels"],
        desc: "Compute the number of nodes on the longest root-to-leaf path. This is the canonical warm-up for tree recursion.",
        insight: "Depth is a pure bottom-up quantity: the current depth is <code>1 + max(leftDepth, rightDepth)</code>.",
        viz: "maxDepth",
        code: `<span class="kw">if</span> (root <span class="op">==</span> <span class="kw">null</span>) <span class="kw">return</span> <span class="nm">0</span>;\n<span class="kw">int</span> left <span class="op">=</span> <span class="fn">maxDepth</span>(root.left);\n<span class="kw">int</span> right <span class="op">=</span> <span class="fn">maxDepth</span>(root.right);\n<span class="kw">return</span> Math.max(left, right) <span class="op">+</span> <span class="nm">1</span>;\n\n<span class="cm">// count nodes, not edges</span>`,
        gotcha: "The empty tree returns <code>0</code>, so a single node returns <code>1</code>. Mixing node-count and edge-count definitions causes off-by-one answers.",
        time: "O(n)",
        space: "O(h)",
        tags: ["tree height", "bottom-up recursion", "depth"]
      },
      {
        title: "Invert Binary Tree",
        category: "DFS",
        primary: "Swap Children",
        secondary: ["BFS Queue"],
        desc: "Mirror the tree by swapping every node's left and right child. The operation is local and repeats independently at each node.",
        insight: "The whole problem is just a recursive local swap; there is no BST or ordering logic to preserve.",
        viz: "invert",
        code: `<span class="kw">if</span> (root <span class="op">==</span> <span class="kw">null</span>) <span class="kw">return</span> <span class="kw">null</span>;\nTreeNode left <span class="op">=</span> <span class="fn">invertTree</span>(root.left);\nTreeNode right <span class="op">=</span> <span class="fn">invertTree</span>(root.right);\nroot.left <span class="op">=</span> right;\nroot.right <span class="op">=</span> left;\n<span class="kw">return</span> root;`,
        gotcha: "Do not overwrite one child before saving the other. Writing <code>root.left = root.right</code> first loses the original left subtree.",
        time: "O(n)",
        space: "O(h)",
        tags: ["mirror tree", "swap children", "recursive transform"]
      },
      {
        title: "Construct Tree from Preorder + Inorder",
        category: "BUILD",
        primary: "Index Map",
        secondary: ["Recursive Slices"],
        desc: "Rebuild the tree when preorder gives roots in sequence and inorder tells how each root splits the left and right subtrees.",
        insight: "Preorder gives the next root immediately; inorder tells exactly how many nodes belong to its left subtree.",
        viz: "preInBuild",
        code: `<span class="kw">int</span> val <span class="op">=</span> preorder[preIdx<span class="op">++</span>];\nTreeNode root <span class="op">=</span> <span class="kw">new</span> TreeNode(val);\n<span class="kw">int</span> mid <span class="op">=</span> inPos.get(val);\nroot.left <span class="op">=</span> <span class="fn">build</span>(left, mid);\nroot.right <span class="op">=</span> <span class="fn">build</span>(mid <span class="op">+</span> <span class="nm">1</span>, right);\n<span class="kw">return</span> root;`,
        gotcha: "Use half-open ranges or be extremely consistent with inclusive bounds. Off-by-one errors usually show up in the right subtree call.",
        time: "O(n)",
        space: "O(n)",
        tags: ["preorder", "inorder split", "hash map"]
      },
      {
        title: "Construct Tree from Inorder + Postorder",
        category: "BUILD",
        primary: "Index Map",
        secondary: ["Recursive Bounds"],
        desc: "Rebuild the tree when postorder gives the root at the end and inorder still determines the left/right partition.",
        insight: "Because postorder reads left, right, root, when consuming from the end you must build the right subtree before the left.",
        viz: "inPostBuild",
        code: `<span class="kw">int</span> val <span class="op">=</span> postorder[postIdx<span class="op">--</span>];\nTreeNode root <span class="op">=</span> <span class="kw">new</span> TreeNode(val);\n<span class="kw">int</span> mid <span class="op">=</span> inPos.get(val);\nroot.right <span class="op">=</span> <span class="fn">build</span>(mid <span class="op">+</span> <span class="nm">1</span>, right);\nroot.left <span class="op">=</span> <span class="fn">build</span>(left, mid <span class="op">-</span> <span class="nm">1</span>);\n<span class="kw">return</span> root;`,
        gotcha: "The recursive order is the trap: build <code>right</code> first. If you build left first, you consume the wrong root from postorder.",
        time: "O(n)",
        space: "O(n)",
        tags: ["postorder", "inorder split", "right-first recursion"]
      },
      {
        title: "Serialize and Deserialize Binary Tree",
        category: "DESIGN",
        primary: "Preorder + Nulls",
        secondary: ["BST Bounds Codec"],
        desc: "Turn a binary tree into a string and back. The generic tree-safe pattern is preorder traversal with explicit null markers.",
        insight: "Null sentinels preserve shape; without them, different trees can serialize to the same value sequence.",
        viz: "serialize",
        code: `<span class="kw">if</span> (node <span class="op">==</span> <span class="kw">null</span>) {\n  out.append(<span class="str2">"null,"</span>);\n  <span class="kw">return</span>;\n}\nout.append(node.val).append(<span class="str2">","</span>);\n<span class="fn">ser</span>(node.left, out);\n<span class="fn">ser</span>(node.right, out);`,
        gotcha: "If you omit <code>null</code> markers, trees like <code>1,left=2</code> and <code>1,right=2</code> collapse to the same preorder list.",
        time: "O(n)",
        space: "O(n)",
        tags: ["codec", "preorder", "null sentinel"]
      },
      {
        title: "Validate Binary Search Tree",
        category: "BST",
        primary: "Min / Max Bounds",
        secondary: ["Iterative Inorder"],
        desc: "Check whether every node respects the strict BST invariant, not just relative to its parent but relative to the full ancestor range.",
        insight: "Each recursive call carries the only legal interval for that subtree, and equality is invalid on both sides.",
        viz: "validateBST",
        code: `<span class="kw">boolean</span> <span class="fn">ok</span>(node, low, high) {\n  <span class="kw">if</span> (node <span class="op">==</span> <span class="kw">null</span>) <span class="kw">return</span> <span class="kw">true</span>;\n  <span class="kw">if</span> (node.val <span class="op">&lt;=</span> low <span class="op">||</span> node.val <span class="op">&gt;=</span> high) <span class="kw">return</span> <span class="kw">false</span>;\n  <span class="kw">return</span> <span class="fn">ok</span>(node.left, low, node.val)\n      <span class="op">&amp;&amp;</span> <span class="fn">ok</span>(node.right, node.val, high);\n}`,
        gotcha: "Use <code>long</code> bounds and strict inequality. <code>Integer.MIN_VALUE</code> and duplicate values both break naive integer checks.",
        time: "O(n)",
        space: "O(h)",
        tags: ["ancestor bounds", "strict inequality", "inorder sorted"]
      },
      {
        title: "Vertical Order Traversal",
        category: "BFS / SORT",
        primary: "DFS + Sort",

            <rect x="28" y="18" width="36" height="56" rx="6" fill="#fff" stroke="#bbb"/>
            <rect x="34" y="53" width="24" height="12" rx="3" fill="${a}"/><rect x="34" y="38" width="24" height="12" rx="3" fill="#e8e8e8"/><rect x="34" y="23" width="24" height="12" rx="3" fill="#e8e8e8"/>
            <text x="46" y="62" font-size="7" text-anchor="middle" fill="#fff">3</text><text x="46" y="47" font-size="7" text-anchor="middle" fill="#666">7</text><text x="46" y="32" font-size="7" text-anchor="middle" fill="#666">15</text>
            <path d="M76 46 L126 46" stroke="${a}" stroke-width="2" marker-end="url(#arrIt)"/><defs><marker id="arrIt" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${a}"/></marker></defs>
            <text x="132" y="40" font-size="8" fill="${a}">pop next</text>
            <text x="132" y="54" font-size="8" fill="#666">pushLeft(right)</text>
            <text x="18" y="86" font-size="8" fill="#666">stack stores current inorder frontier</text>
          </svg>`;
        case "rightView":
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg">
            <rect width="280" height="95" rx="8" fill="#F5F3EE"/>
            <circle cx="88" cy="18" r="10" fill="#fff" stroke="#bbb"/><circle cx="66" cy="44" r="10" fill="#fff" stroke="#bbb"/><circle cx="110" cy="44" r="10" fill="${a}"/><circle cx="122" cy="70" r="10" fill="${a}"/>
            <line x1="88" y1="18" x2="66" y2="44" stroke="#bbb" stroke-width="1.4"/><line x1="88" y1="18" x2="110" y2="44" stroke="#bbb" stroke-width="1.4"/><line x1="110" y1="44" x2="122" y2="70" stroke="#bbb" stroke-width="1.4"/>
            <text x="88" y="22" font-size="9" text-anchor="middle" fill="#666">1</text><text x="66" y="48" font-size="9" text-anchor="middle" fill="#666">2</text><text x="110" y="48" font-size="9" text-anchor="middle" fill="#fff">3</text><text x="122" y="74" font-size="9" text-anchor="middle" fill="#fff">4</text>
            <path d="M154 18 L154 74" stroke="${a}" stroke-width="2" stroke-dasharray="4 3"/>
            <text x="164" y="48" font-size="8" fill="${a}">take last node per level</text>
          </svg>`;
        case "largestBST":
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg">
            <rect width="280" height="95" rx="8" fill="#F5F3EE"/>
            <line x1="140" y1="18" x2="98" y2="42" stroke="#bbb" stroke-width="1.4"/><line x1="140" y1="18" x2="182" y2="42" stroke="#bbb" stroke-width="1.4"/>
            <circle cx="140" cy="18" r="10" fill="#fff" stroke="#bbb"/><circle cx="98" cy="42" r="10" fill="${a}"/><circle cx="182" cy="42" r="10" fill="#fff" stroke="#bbb"/>
            <text x="140" y="22" font-size="9" text-anchor="middle" fill="#666">10</text><text x="98" y="46" font-size="9" text-anchor="middle" fill="#fff">5</text><text x="182" y="46" font-size="9" text-anchor="middle" fill="#666">15</text>
            <rect x="56" y="62" width="84" height="16" rx="8" fill="${a}"/><text x="98" y="73" font-size="8" text-anchor="middle" fill="#fff">min,max,size</text>
            <rect x="156" y="62" width="84" height="16" rx="8" fill="#fff" stroke="#bbb"/><text x="198" y="73" font-size="8" text-anchor="middle" fill="#666">invalid sentinels</text>
          </svg>`;
        case "rangeSum":
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg">
            <rect width="280" height="95" rx="8" fill="#F5F3EE"/>
            <rect x="18" y="14" width="108" height="14" rx="7" fill="#fff" stroke="#bbb"/><text x="72" y="24" font-size="8" text-anchor="middle" fill="#666">range [7, 15]</text>
            <line x1="140" y1="32" x2="104" y2="58" stroke="#bbb" stroke-width="1.4"/><line x1="140" y1="32" x2="176" y2="58" stroke="#bbb" stroke-width="1.4"/>
            <circle cx="140" cy="32" r="10" fill="${a}"/><circle cx="104" cy="58" r="10" fill="${a}"/><circle cx="176" cy="58" r="10" fill="${a}"/>
            <text x="140" y="36" font-size="9" text-anchor="middle" fill="#fff">10</text><text x="104" y="62" font-size="9" text-anchor="middle" fill="#fff">7</text><text x="176" y="62" font-size="9" text-anchor="middle" fill="#fff">15</text>
            <text x="196" y="24" font-size="8" fill="#666">node &lt; low ⇒ go right</text>
            <text x="196" y="38" font-size="8" fill="#666">node &gt; high ⇒ go left</text>
            <text x="162" y="84" font-size="8" fill="${a}">sum only in-range nodes</text>
          </svg>`;
        case "rootLeafSum":
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg">
            <rect width="280" height="95" rx="8" fill="#F5F3EE"/>
            <line x1="80" y1="18" x2="56" y2="46" stroke="#bbb" stroke-width="1.4"/><line x1="80" y1="18" x2="104" y2="46" stroke="#bbb" stroke-width="1.4"/>
            <circle cx="80" cy="18" r="10" fill="${a}"/><circle cx="56" cy="46" r="10" fill="#fff" stroke="#bbb"/><circle cx="104" cy="46" r="10" fill="#fff" stroke="#bbb"/>
            <text x="80" y="22" font-size="9" text-anchor="middle" fill="#fff">1</text><text x="56" y="50" font-size="9" text-anchor="middle" fill="#666">2</text><text x="104" y="50" font-size="9" text-anchor="middle" fill="#666">3</text>
            <rect x="146" y="16" width="110" height="18" rx="9" fill="#fff" stroke="#bbb"/><text x="201" y="28" font-size="8" text-anchor="middle" fill="#666">curr = 0</text>
            <rect x="146" y="40" width="110" height="18" rx="9" fill="${a}"/><text x="201" y="52" font-size="8" text-anchor="middle" fill="#fff">1 → 12 / 13</text>
            <text x="146" y="82" font-size="8" fill="${a}">curr = curr * 10 + digit</text>
          </svg>`;
        case "largestRow":
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg">
            <rect width="280" height="95" rx="8" fill="#F5F3EE"/>
            <rect x="24" y="16" width="52" height="14" rx="7" fill="${a}"/><text x="50" y="26" font-size="8" text-anchor="middle" fill="#fff">lvl0 max=1</text>
            <rect x="24" y="40" width="58" height="14" rx="7" fill="#fff" stroke="#bbb"/><text x="53" y="50" font-size="8" text-anchor="middle" fill="#666">lvl1 max=3</text>
            <rect x="24" y="64" width="64" height="14" rx="7" fill="${a}" opacity=".9"/><text x="56" y="74" font-size="8" text-anchor="middle" fill="#fff">lvl2 max=9</text>
            <text x="120" y="28" font-size="8" fill="#666">reset per level</text>
            <text x="120" y="52" font-size="8" fill="#666">scan all nodes in level</text>
            <text x="120" y="76" font-size="8" fill="${a}">append once after loop</text>
          </svg>`;
        case "trimBST":
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg">
            <rect width="280" height="95" rx="8" fill="#F5F3EE"/>
            <rect x="18" y="14" width="102" height="14" rx="7" fill="#fff" stroke="#bbb"/><text x="69" y="24" font-size="8" text-anchor="middle" fill="#666">keep [1, 3]</text>
            <line x1="140" y1="24" x2="104" y2="52" stroke="#bbb" stroke-width="1.4"/><line x1="140" y1="24" x2="176" y2="52" stroke="#bbb" stroke-width="1.4"/>
            <circle cx="140" cy="24" r="10" fill="#fff" stroke="#bbb"/><circle cx="104" cy="52" r="10" fill="${a}"/><circle cx="176" cy="52" r="10" fill="#fff" stroke="#bbb"/>
            <text x="140" y="28" font-size="9" text-anchor="middle" fill="#666">3</text><text x="104" y="56" font-size="9" text-anchor="middle" fill="#fff">2</text><text x="176" y="56" font-size="9" text-anchor="middle" fill="#666">4</text>
            <path d="M176 52 L202 52" stroke="#FF3B00" stroke-width="2"/><text x="206" y="56" font-size="8" fill="#FF3B00">drop > high</text>
            <text x="118" y="84" font-size="8" fill="${a}">node < low ⇒ return right, node > high ⇒ return left</text>
          </svg>`;
        case "insertDelete":
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg">
            <rect width="280" height="95" rx="8" fill="#F5F3EE"/>
            <circle cx="76" cy="22" r="10" fill="#fff" stroke="#bbb"/><circle cx="52" cy="50" r="10" fill="#fff" stroke="#bbb"/><circle cx="100" cy="50" r="10" fill="${a}"/>
            <line x1="76" y1="22" x2="52" y2="50" stroke="#bbb" stroke-width="1.4"/><line x1="76" y1="22" x2="100" y2="50" stroke="#bbb" stroke-width="1.4"/>
            <text x="76" y="26" font-size="9" text-anchor="middle" fill="#666">5</text><text x="52" y="54" font-size="9" text-anchor="middle" fill="#666">3</text><text x="100" y="54" font-size="9" text-anchor="middle" fill="#fff">7</text>
            <path d="M126 34 L154 34" stroke="${a}" stroke-width="2" marker-end="url(#arrDel)"/><defs><marker id="arrDel" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${a}"/></marker></defs>
            <rect x="164" y="18" width="88" height="18" rx="9" fill="#fff" stroke="#bbb"/><text x="208" y="30" font-size="8" text-anchor="middle" fill="#666">0 / 1 child</text>
            <rect x="164" y="44" width="88" height="18" rx="9" fill="${a}"/><text x="208" y="56" font-size="8" text-anchor="middle" fill="#fff">2 child → successor</text>
          </svg>`;
        case "predSucc":
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg">
            <rect width="280" height="95" rx="8" fill="#F5F3EE"/>
            <line x1="140" y1="18" x2="98" y2="46" stroke="#bbb" stroke-width="1.4"/><line x1="140" y1="18" x2="182" y2="46" stroke="#bbb" stroke-width="1.4"/>
            <circle cx="140" cy="18" r="10" fill="#fff" stroke="#bbb"/><circle cx="98" cy="46" r="10" fill="${a}"/><circle cx="182" cy="46" r="10" fill="${a}" opacity=".9"/>
            <text x="140" y="22" font-size="9" text-anchor="middle" fill="#666">10</text><text x="98" y="50" font-size="9" text-anchor="middle" fill="#fff">pred</text><text x="182" y="50" font-size="9" text-anchor="middle" fill="#fff">succ</text>
            <text x="18" y="20" font-size="8" fill="#666">turn right ⇒ better pred</text>
            <text x="18" y="36" font-size="8" fill="#666">turn left ⇒ better succ</text>
            <text x="18" y="84" font-size="8" fill="${a}">or use rightmost(left subtree) / leftmost(right subtree)</text>
          </svg>`;
        default:
          return `<svg viewBox="0 0 280 95" xmlns="http://www.w3.org/2000/svg"><rect width="280" height="95" rx="8" fill="#F5F3EE"/><text x="140" y="48" text-anchor="middle" font-size="10" fill="${a}">viz</text></svg>`;
      }
    }

    function renderCard(card, index) {
      const accent = accents[index % accents.length];
      const num = String(index + 1).padStart(2, "0");
      const chips = [
        `<span class="ap-chip primary">${card.primary}</span>`,
        ...card.secondary.map(s => `<span class="ap-chip">${s}</span>`)
      ].join("");

      const tags = card.tags.map(tag => `<span class="pattern-tag">${tag}</span>`).join("");

      return `
        <article class="card" style="--accent:${accent}">
          <div class="card-stripe"></div>
          <div class="card-head">
            <div class="card-num">${num} / ${card.category}</div>
            <h2 class="card-title">${card.title}</h2>
          </div>
          <div class="approaches">${chips}</div>
          <div class="problem-desc">${card.desc}</div>
          <div class="card-viz">${viz(card.viz)}</div>
          <div class="card-body">
            <div class="insight-block">
              <div class="block-label">Key Insight</div>
              <div class="insight-text">${card.insight}</div>
            </div>
            <div class="mini-code">
              <div class="titlebar">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="code-label">Critical Logic</span>
              </div>
              <pre><code>${card.code}</code></pre>
            </div>
            <div class="gotcha">
              <div class="gotcha-title">Gotcha</div>
              <p>${card.gotcha}</p>
            </div>
            <div class="complexity-row">
              <span class="cx-badge">Time: ${card.time}</span>
              <span class="cx-badge">Space: ${card.space}</span>
            </div>
          </div>
          <div class="pattern-row">${tags}</div>
        </article>
      `;
    }

    document.getElementById("problem-count").textContent = String(cards.length);
    document.getElementById("grid").innerHTML = cards.map(renderCard).join("");
  </script>
</body>
</html>
